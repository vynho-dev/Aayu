<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="../../_ds_bundle.js"></script>
<div id="root" style="padding:16px;background:var(--aayu-surface-page)"></div>
<script type="text/babel">
const { Button, TrustBadge, StatusChip, MetricCard } = window.AayuDesignSystem_84693d;
function Demo(){
  React.useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });
  return (
    <div style={{display:'flex', flexDirection:'column', gap:20, fontFamily:'var(--font-sans)'}}>
      <div style={{display:'flex', gap:12, flexWrap:'wrap'}}>
        <Button variant="primary">Continue</Button>
        <Button variant="secondary">Cancel</Button>
        <Button variant="ghost">Skip for now</Button>
        <Button variant="primary" loading>Working</Button>
        <Button variant="primary" disabled>Disabled</Button>
      </div>
      <div style={{display:'flex', gap:12, flexWrap:'wrap'}}>
        <TrustBadge icon="shield-check">Your data is encrypted</TrustBadge>
        <TrustBadge icon="lock">Pay only if we win</TrustBadge>
      </div>
      <div style={{display:'flex', gap:12, flexWrap:'wrap'}}>
        <StatusChip tone="success">Approved</StatusChip>
        <StatusChip tone="attention">Needs review</StatusChip>
        <StatusChip tone="neutral">Draft</StatusChip>
      </div>
      <div style={{display:'flex', gap:12, flexWrap:'wrap'}}>
        <MetricCard label="Recoverable amount" value="₹18,400" tone="teal" />
        <MetricCard label="Documents uploaded" value="3" tone="ink" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
