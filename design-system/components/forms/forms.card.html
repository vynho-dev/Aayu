<div id="root" style="padding:16px;background:var(--aayu-surface-page)"></div>
<script type="text/babel">
const { Input, Select, PatientSelector, UploadDropzone } = window.AayuDesignSystem_84693d;
function Demo(){
  React.useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });
  return (
    <div style={{display:'flex', flexDirection:'column', gap:20, fontFamily:'var(--font-sans)', maxWidth:340}}>
      <Input label="Patient's name" placeholder="e.g. Appa" />
      <Input label="Email" error="Enter a valid email" />
      <Select label="Relation to patient" placeholder="Choose one" options={['Father','Mother','Spouse','Sibling','Other']} />
      <PatientSelector name="Appa" relation="Father" age={62} selected />
      <PatientSelector name="Amma" relation="Mother" age={58} />
      <UploadDropzone files={[{name:'rejection-letter.pdf', status:'done'}, {name:'policy.pdf', status:'reading'}]} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
