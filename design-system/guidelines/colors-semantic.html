<!-- @dsCard group="Colors" viewport="700x150" name="Semantic" subtitle="Success, attention (not danger), danger" -->
<link rel="stylesheet" href="../../styles.css">
<div style="display:flex;gap:12px;height:150px;font-family:var(--font-sans);padding:8px">
<div style="flex:1;background:var(--aayu-success-bg);border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px"><div style="color:var(--aayu-success);font-weight:500;font-size:14px">Success</div><div style="font-size:11px;color:var(--aayu-text-secondary)">#0F6E56 on #E1F5EE</div></div>
<div style="flex:1;background:var(--aayu-attention-bg);border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px"><div style="color:var(--aayu-attention);font-weight:500;font-size:14px">Attention</div><div style="font-size:11px;color:var(--aayu-text-secondary)">needs review, not danger</div></div>
<div style="flex:1;background:var(--aayu-danger-bg);border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px"><div style="color:var(--aayu-danger);font-weight:500;font-size:14px">Danger</div><div style="font-size:11px;color:var(--aayu-text-secondary)">real errors only</div></div>
</div>
