<link rel="stylesheet" href="../../styles.css">
<div style="display:flex;gap:20px;padding:20px;font-family:var(--font-sans);align-items:center;height:160px;background:var(--aayu-surface-page)">
<div style="width:140px;height:100px;background:var(--aayu-surface-card);border:0.5px solid var(--aayu-border);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--aayu-text-secondary)">elevation-0<br>in-flow card</div>
<div style="width:140px;height:100px;background:var(--aayu-surface-card);box-shadow:var(--elevation-1);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--aayu-text-secondary)">elevation-1<br>raised card</div>
<div style="width:140px;height:100px;background:var(--aayu-surface-card);box-shadow:var(--elevation-2);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--aayu-text-secondary)">elevation-2<br>sheet/dropdown</div>
</div>
