services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: aayu
      POSTGRES_USER: aayu
      POSTGRES_PASSWORD: aayu
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aayu"]
      interval: 3s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build: apps/backend
    environment:
      AAYU_ENVIRONMENT: development
      AAYU_AUTH_MODE: dev
      AAYU_DATABASE_URL: postgresql+psycopg://aayu:aayu@postgres:5432/aayu
      AAYU_CORS_ORIGINS: http://localhost:5173
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    command: ["sh", "-c", "alembic upgrade head && uvicorn aayu.main:app --host 0.0.0.0 --port 8000"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  postgres-data:
